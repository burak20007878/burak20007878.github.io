<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Demontaj Analizi</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
  :root{
    --cream:#F3EEE0;--cream-2:#FBF8F0;--card:#FFFFFF;--ink:#4A3E30;--ink-soft:#6E6051;
    --line:#E2D9C5;--olive:#45502E;--red:#B5432E;--green:#5E7B3E;--green-d:#4C6731;
    --orange:#C8763C;--blue:#3E7CB1;--wood:#9C6B3F;--shadow:0 1px 3px rgba(74,62,48,.07),0 6px 18px rgba(74,62,48,.05);
  }
  *{box-sizing:border-box}
  html,body{margin:0;padding:0}
  body{background:var(--cream);color:var(--ink);
    font-family:'Inter',system-ui,-apple-system,Segoe UI,Roboto,sans-serif;
    font-size:15px;line-height:1.5;-webkit-font-smoothing:antialiased}
  .wrap{max-width:1240px;margin:0 auto;padding:18px 22px 48px}

  header{display:flex;align-items:center;justify-content:space-between;gap:18px;
    padding:14px 22px;border-radius:14px;background:var(--cream-2);
    border:1px solid var(--line);box-shadow:var(--shadow);flex-wrap:wrap}
  .brand{display:flex;align-items:baseline;gap:14px;flex-wrap:wrap}
  .brand h1{font-size:26px;font-weight:800;margin:0;letter-spacing:-.4px}
  .brand h1 .c1{color:var(--olive)} .brand h1 .c2{color:var(--red)}
  .brand .sub{font-size:12.5px;color:var(--ink-soft);font-weight:500}
  .sig{font-family:'Great Vibes',cursive;font-size:30px;color:var(--olive);
    line-height:1;white-space:nowrap;transform:translateY(-2px)}
  .sig b{color:var(--red);font-weight:400}

  .tabs{display:flex;gap:6px;flex-wrap:wrap;margin:16px 0 0}
  .tab{padding:9px 14px;border:1px solid var(--line);background:var(--cream-2);border-radius:10px;
    font-weight:600;font-size:13.5px;color:var(--ink-soft);cursor:pointer;transition:.15s}
  .tab:hover{background:#fff}
  .tab.active{background:var(--olive);color:#fff;border-color:var(--olive);box-shadow:var(--shadow)}
  .tab.rapor{margin-left:4px;background:#F1E7D8;color:#875a34;border-color:#E0D2BC}
  .tab.rapor.active{background:var(--olive);color:#fff;border-color:var(--olive)}

  .panel{background:var(--card);border:1px solid var(--line);border-radius:14px;
    box-shadow:var(--shadow);padding:22px;margin-top:16px}
  .panel h2{margin:0;font-size:19px;font-weight:800;color:var(--ink);letter-spacing:-.3px}
  .panel h2 small{display:block;font-size:12.5px;font-weight:500;color:var(--ink-soft);
    letter-spacing:0;margin-top:3px}
  .panel h2.olive{background:var(--olive);color:#fff;padding:13px 18px;border-radius:11px}
  .panel h2.olive small{color:#E7EBDD}
  .phead{display:flex;justify-content:space-between;align-items:center;gap:18px;flex-wrap:wrap}
  .phead h2{margin:0}
  .catpic{max-height:104px;max-width:230px;border-radius:12px;border:1px solid var(--line);
    object-fit:contain;background:#fff;padding:4px;box-shadow:var(--shadow)}
  @media(max-width:620px){.catpic{max-height:84px}}

  .tablewrap{overflow-x:auto;margin-top:16px}
  .htable{min-width:800px}
  .hhead,.hrow{display:grid;grid-template-columns:34px minmax(230px,1fr) 118px 150px 150px 30px;gap:10px;align-items:center}
  .hhead{font-size:11px;text-transform:uppercase;letter-spacing:.4px;color:var(--ink-soft);
    font-weight:700;padding:0 4px 9px}
  .hhead .r{text-align:left}
  .hrow{padding:8px 4px;border-top:1px solid #F0E9D9}
  .hno{font-weight:700;color:var(--ink-soft);font-size:13px;text-align:center}
  input.hf{width:100%;padding:10px 12px;border:1px solid var(--line);border-radius:11px;
    background:var(--cream-2);color:var(--ink);font-size:13.5px;font-family:inherit;font-weight:500;
    outline:none;transition:.15s}
  input.hf:focus{border-color:var(--green);background:#fff;box-shadow:0 0 0 3px rgba(94,123,62,.13)}

  /* oval / soft malzeme seçim kutusu */
  .picker{display:flex;align-items:center;gap:8px;width:100%;padding:9px 14px;border:1px solid var(--line);
    border-radius:13px;background:var(--cream-2);cursor:pointer;transition:.15s;min-height:40px}
  .picker:hover{border-color:var(--green);background:#fff;box-shadow:0 1px 4px rgba(74,62,48,.08)}
  .picker.open{border-color:var(--green);background:#fff;box-shadow:0 0 0 3px rgba(94,123,62,.13)}
  .picker .pn{flex:1;font-size:13.5px;font-weight:500;color:var(--ink);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .picker .chev{color:var(--ink-soft);font-size:11px;flex:none;transition:.15s}
  .picker.open .chev{transform:rotate(180deg);color:var(--green)}

  /* açılır panel */
  #ddPanel{position:absolute;z-index:1000;display:none;background:#fff;border:1px solid var(--line);
    border-radius:16px;box-shadow:0 14px 38px rgba(74,62,48,.20);padding:9px;min-width:280px}
  #ddSearch{width:100%;padding:11px 13px;border:1px solid var(--line);border-radius:11px;background:var(--cream-2);
    font-family:inherit;font-size:13.5px;color:var(--ink);outline:none;margin-bottom:7px}
  #ddSearch:focus{border-color:var(--green);background:#fff;box-shadow:0 0 0 3px rgba(94,123,62,.13)}
  #ddList{max-height:300px;overflow-y:auto;padding-right:2px}
  .ddItem{padding:10px 12px;border-radius:10px;font-size:13px;color:var(--ink);cursor:pointer;
    line-height:1.35;transition:.1s}
  .ddItem:hover{background:#F2ECDD}
  .ddItem.sel{background:var(--olive);color:#fff}
  .ddEmpty{padding:14px;color:var(--ink-soft);font-style:italic;font-size:13px;text-align:center}
  .huw{font-size:12px;font-weight:600;color:var(--ink-soft);font-variant-numeric:tabular-nums;white-space:nowrap}
  .hin{display:flex;gap:6px;align-items:center}
  .hin input{text-align:right;font-variant-numeric:tabular-nums}
  .hin .u{font-size:11.5px;font-weight:700;color:var(--ink-soft);background:#EDE5D2;
    border-radius:7px;padding:8px 9px;white-space:nowrap;flex:none}
  .hbrk{grid-column:1 / -1;font-size:12px;color:var(--ink-soft);padding:4px 0 2px 44px;font-variant-numeric:tabular-nums}
  .hbrk .d{display:inline-block;width:7px;height:7px;border-radius:50%;margin:0 5px 0 0;vertical-align:middle}
  .hbrk b{color:var(--ink);font-weight:700}

  .hsub{display:grid;grid-template-columns:34px minmax(230px,1fr) 118px 150px 150px 30px;gap:10px;
    align-items:center;margin-top:6px;padding:14px 4px 0;border-top:2px solid var(--line)}
  .hsub .lbl{grid-column:1 / 4;font-weight:800;font-size:13px;text-transform:uppercase;letter-spacing:.5px;color:var(--ink-soft)}
  .hsub .sv{font-weight:800;font-variant-numeric:tabular-nums;text-align:right;font-size:15px;color:var(--green-d)}
  .hsub .sv.kg{color:var(--green-d)}

  .pageacts{display:flex;justify-content:flex-end;margin-top:16px}
  .pdfbtn{cursor:pointer;border:0;border-radius:11px;background:var(--green);color:#fff;
    font-family:inherit;font-weight:700;font-size:14px;padding:12px 20px;display:inline-flex;
    align-items:center;gap:9px;transition:.15s;box-shadow:0 2px 6px rgba(76,103,49,.25)}
  .pdfbtn:hover{background:var(--green-d)}
  .pdfbtn.wood{background:var(--wood);box-shadow:0 2px 6px rgba(156,107,63,.28)}
  .pdfbtn.wood:hover{background:#875a34}
  .pdfbtn svg{width:17px;height:17px;flex:none}
  .pdfbtn:active{background:var(--olive)}
  .addwrap{padding:6px 4px 2px}
  .addrow{width:100%;cursor:pointer;border:1.5px dashed #CDBE9F;background:transparent;
    color:var(--olive);font-family:inherit;font-weight:700;font-size:13.5px;padding:11px;border-radius:11px;transition:.15s}
  .addrow:hover{background:var(--olive);color:#fff;border-color:var(--olive)}
  .hdel{width:26px;height:26px;border:0;border-radius:7px;background:#EFE6D6;color:#9A8E7B;
    font-size:16px;line-height:1;cursor:pointer;transition:.15s}
  .hdel:hover{background:var(--red);color:#fff}

  .help{margin-top:16px;background:var(--cream-2);border:1px solid var(--line);
    border-left:3px solid var(--green);border-radius:10px;padding:14px 16px}
  .help h3{margin:0 0 8px;font-size:12px;text-transform:uppercase;letter-spacing:.5px;color:var(--ink-soft)}
  .help p{margin:0 0 8px;font-size:13px;color:var(--ink-soft);line-height:1.6}
  .help p:last-child{margin-bottom:0}
  .help b{color:var(--ink)} 
  .help code{background:#F2ECDD;border:1px solid var(--line);border-radius:6px;padding:1px 6px;
    font-size:12px;color:var(--olive);font-family:ui-monospace,Menlo,Consolas,monospace}

  /* RAPOR (ekran) */
  .rgrp{margin-top:18px}
  .rgrp h3{margin:0 0 6px;font-size:13px;font-weight:800;color:var(--olive);
    text-transform:uppercase;letter-spacing:.4px}
  .rtbl{width:100%;border-collapse:collapse;font-size:13px}
  .rtbl th,.rtbl td{text-align:left;padding:8px 8px;border-bottom:1px solid #F0E9D9}
  .rtbl th{font-size:10.5px;text-transform:uppercase;letter-spacing:.4px;color:var(--ink-soft);font-weight:700}
  .rtbl td.r,.rtbl th.r{text-align:right;font-variant-numeric:tabular-nums;white-space:nowrap}
  .rtbl td.r{font-weight:600}
  .rsub td{font-weight:700;color:var(--olive);border-top:1.5px solid #D9CFB8;background:#FAF6EC}
  .rgrand{display:flex;justify-content:space-between;align-items:center;margin-top:18px;
    background:linear-gradient(180deg,#FBF8F0,#F6F1E5);border:1px solid var(--line);border-radius:12px;padding:16px 18px}
  .rgrand .l{font-size:12px;font-weight:800;text-transform:uppercase;letter-spacing:.5px;color:var(--ink-soft)}
  .rgrand .v{font-size:26px;font-weight:800;color:var(--wood);letter-spacing:-.4px}
  .rempty{color:var(--ink-soft);font-style:italic;padding:26px 6px;text-align:center}

  footer{margin-top:22px;text-align:center;color:var(--ink-soft);font-size:12px}
  footer .sig{font-size:22px}

  /* ---- YAZDIRMA / PDF ---- */
  #printArea{display:none}
  @media print{
    @page{size:A4;margin:14mm}
    html,body{background:#fff !important}
    .wrap{display:none !important}
    #printArea{display:block !important;color:#2A241C;font-size:11.5px;
      -webkit-print-color-adjust:exact;print-color-adjust:exact}
    #printArea *{-webkit-print-color-adjust:exact;print-color-adjust:exact}
    #printArea .ph{border-bottom:2px solid #45502E;padding-bottom:10px;margin-bottom:4px}
    #printArea .ph h1{margin:0;font-size:21px;font-weight:800;letter-spacing:-.3px}
    #printArea .ph h1 .c1{color:#45502E} #printArea .ph h1 .c2{color:#B5432E}
    #printArea .ph .pdsub{font-size:10.5px;color:#6E6051;margin-top:3px}
    #printArea .meta{font-size:10.5px;color:#45502E;font-weight:700;margin:10px 0 14px}
    #printArea .rgrp{margin-bottom:14px}
    #printArea .rgrp h3{margin:0 0 5px;font-size:11.5px;font-weight:800;color:#45502E;
      text-transform:uppercase;letter-spacing:.4px}
    #printArea table{width:100%;border-collapse:collapse}
    #printArea th{text-align:left;font-size:9.5px;text-transform:uppercase;letter-spacing:.4px;
      color:#6E6051;border-bottom:1.3px solid #D9CFB8;padding:6px 7px}
    #printArea td{padding:6px 7px;border-bottom:1px solid #ECE4D2;font-size:11px}
    #printArea td.r,#printArea th.r{text-align:right;font-variant-numeric:tabular-nums;white-space:nowrap;font-weight:700}
    #printArea tr.sub td{font-weight:800;color:#45502E;background:#F6F1E5;border-top:1.2px solid #D9CFB8}
    #printArea .grand{display:flex;justify-content:space-between;align-items:center;
      margin-top:14px;background:#F1E7D8;border:1px solid #E0D2BC;border-radius:8px;padding:12px 16px}
    #printArea .grand .l{font-size:11px;font-weight:800;text-transform:uppercase;letter-spacing:.5px;color:#6E6051}
    #printArea .grand .v{font-size:20px;font-weight:800;color:#875a34}
    #printArea .pfoot{margin-top:22px;padding-top:10px;border-top:1px solid #E2D9C5;font-size:10px;color:#9A8E7B}
  }
</style>
</head>
<body>
<div class="wrap">

  <header>
    <div class="brand">
      <h1><span class="c1">Demontaj</span> <span class="c2">Analizi</span></h1>
      <span class="sub">Elektrik Dağıtım · Malzeme Ağırlık / Miktar Hesabı</span>
    </div>
    <div class="sig">Design by <b>Oğuz GÜNDÜZ</b></div>
  </header>

  <div class="tabs" id="tabs"></div>

  <div id="view"></div>

  <footer>
    <div class="sig">Design by <b>Oğuz GÜNDÜZ</b></div>
    Demontaj Analizi · Elektrik Dağıtım Hesap Aracı
  </footer>
</div>

<div id="ddPanel">
  <input id="ddSearch" type="text" placeholder="Malzeme ara..." oninput="filterDD()" autocomplete="off">
  <div id="ddList"></div>
</div>
<div id="printArea"></div>

<script>
/* ====== İLETKEN (kompozit) verisi ====== */
const COND = {
  rose:{label:"Rose",kg:59.15}, pansy:{label:"Pansy",kg:118.32},
  poppy:{label:"Poppy",kg:148.92}, aster:{label:"Aster",kg:187.58},
  phlox:{label:"Phlox",kg:236.64}, swallow:{label:"Swallow",kg:109.96},
  raven:{label:"Raven",kg:220.52}, pigeon:{label:"Pigeon",kg:350.78},
  partridge:{label:"Partridge",kg:554.68}, hawk:{label:"Hawk",kg:992.26},
};
const DOTCOL = {rose:"#B5432E",pansy:"#3E7CB1",poppy:"#C8763C",aster:"#7E5AA8",
  phlox:"#379E94",swallow:"#5E7B3E",raven:"#8A6D3B",pigeon:"#5A6E8C",
  partridge:"#9C5B3F",hawk:"#45502E"};
const CONDTYPES = [
  {name:"R Tertip AG Havai Hat",  g:"AG", parts:[["rose",1]]},
  {name:"2R Tertip AG Havai Hat", g:"AG", parts:[["rose",2]]},
  {name:"3R Tertip AG Havai Hat", g:"AG", parts:[["rose",3]]},
  {name:"5R Tertip AG Havai Hat", g:"AG", parts:[["rose",5]]},
  {name:"6R Tertip AG Havai Hat", g:"AG", parts:[["rose",6]]},
  {name:"3P+R/P Tertip AG Havai Hat",  g:"AG", parts:[["pansy",4],["rose",1]]},
  {name:"3P+2R/P Tertip AG Havai Hat", g:"AG", parts:[["pansy",4],["rose",2]]},
  {name:"3A+R/P Tertip AG Havai Hat",  g:"AG", parts:[["aster",3],["rose",1],["pansy",1]]},
  {name:"3A+2R/P Tertip AG Havai Hat", g:"AG", parts:[["aster",3],["rose",2],["pansy",1]]},
  {name:"3Po+R/P Tertip AG Havai Hat", g:"AG", parts:[["poppy",3],["rose",1],["pansy",1]]},
  {name:"3Po+2R/P Tertip AG Havai Hat",g:"AG", parts:[["poppy",3],["rose",2],["pansy",1]]},
  {name:"3Ph+2R/Po Tertip AG Havai Hat",g:"AG",parts:[["phlox",3],["rose",2],["poppy",1]]},
  {name:"4A+R Tertip AG Havai Hat",    g:"AG", parts:[["aster",4],["rose",1]]},
  {name:"3SW",     g:"YG", parts:[["swallow",3]]},
  {name:"3RV",     g:"YG", parts:[["raven",3]]},
  {name:"3/0 AWG", g:"YG", parts:[["pigeon",3]]},
  {name:"266 MCM", g:"YG", parts:[["partridge",3]]},
  {name:"477 MCM", g:"YG", parts:[["hawk",3]]},
  {name:"İLETKEN AER KAB.0,6/1kV.1x16+25",      g:"AER", aer:140},
  {name:"İLETKEN AER KAB.0,6/1kV.3x16+25",      g:"AER", aer:277},
  {name:"İLETKEN AER KAB 3x16+1x16+25",         g:"AER", aer:350},
  {name:"İLETKEN AER KAB.0,6/1kV.3x25+1x16+35", g:"AER", aer:477},
  {name:"İLETKEN AER KAB.0,6/1kV.3x35+1x16+50", g:"AER", aer:627},
  {name:"İLETKEN AER KAB.0,6/1kV.3x50+1x16+70", g:"AER", aer:800},
  {name:"İLETKEN AER KAB.0,6/1kV.3x70+1x16+95", g:"AER", aer:1100},
  {name:"İLETKEN AER KAB.0,6/1kV.3x95+1x16+120",g:"AER", aer:1370},
  {name:"İLETKEN AER KAB.0,6/1kV.3x120+1x16+95",g:"AER", aer:1510},
];
function profile(t){
  if(t.aer!==undefined) return {total:t.aer, comps:[{label:"AER Kablo",n:1,kg:t.aer,col:"#3E7CB1"}]};
  let total=0, comps=[];
  t.parts.forEach(([k,n])=>{ const kg=COND[k].kg; total+=n*kg;
    comps.push({label:COND[k].label,n,kg,col:DOTCOL[k]}); });
  return {total,comps};
}

/* ====== Ağaç Direk ====== */
const POLES = [
  {name:"AĞAÇ DİREK KESİLEREK DEMONTAJI 8-10m",  w:96},
  {name:"AĞAÇ DİREK KESİLEREK DEMONTAJI 11-12m", w:120},
];

/* ====== Kategori modeli ====== */
const CATS = [
  {id:'iletken', label:'İletken',                 kind:'cond',   unit:'km'},
  {id:'direk',   label:'Ağaç Direk',              kind:'simple', unit:'adet', items:POLES},
  {id:'izolator',label:EXTRA.izolator.label,      kind:'simple', unit:'adet', items:EXTRA.izolator.items},
  {id:'aski',    label:EXTRA.aski.label,          kind:'simple', unit:'adet', items:EXTRA.aski.items},
  {id:'gaz',     label:EXTRA.gaz.label,           kind:'simple', unit:'adet', items:EXTRA.gaz.items},
  {id:'armatur', label:EXTRA.armatur.label,       kind:'simple', unit:'adet', items:EXTRA.armatur.items},
  {id:'agkablo', label:EXTRA.agkablo.label,       kind:'simple', unit:'m',    items:EXTRA.agkablo.items},
  {id:'ygkablo', label:EXTRA.ygkablo.label,       kind:'simple', unit:'m',    items:EXTRA.ygkablo.items},
];
const CATBY = {}; CATS.forEach(c=>CATBY[c.id]=c);

/* satır durumları: ROWS[catId] = değişken sayıda {idx,a,b} (1'den başlar) */
const ROWS = {};
CATS.forEach(c=>ROWS[c.id]=[{idx:0,a:null,b:null}]);
let ACTIVE='iletken';

/* ====== yardımcılar ====== */
const fmt = (n,d=3)=> n.toLocaleString('tr-TR',{minimumFractionDigits:d,maximumFractionDigits:d});
const fmt2 = (n)=> n.toLocaleString('tr-TR',{minimumFractionDigits:2,maximumFractionDigits:2});
const fmtIn = (n)=> (n==null||isNaN(n))?'' : Number(n).toLocaleString('tr-TR',{maximumFractionDigits:3,useGrouping:false});
const parseNum = (s)=>{ if(s==null) return NaN; s=(''+s).trim().replace(/\s/g,'').replace(',','.'); return parseFloat(s); };
const escA = (s)=> (''+s).replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/</g,'&lt;').replace(/>/g,'&gt;');

function unitInfo(cat){
  if(cat.unit==='km') return {plabel:'Mesafe (km)', punit:'km', bsuf:'kg/km'};
  if(cat.unit==='m')  return {plabel:'Uzunluk (m)', punit:'m',  bsuf:'kg/m'};
  return {plabel:'Adet', punit:'adet', bsuf:'kg/adet'};
}
function items(cat){ return cat.kind==='cond' ? CONDTYPES : cat.items; }
function itemName(cat,idx){ return items(cat)[idx].name; }
function unitWeight(cat,idx){ return cat.kind==='cond' ? profile(CONDTYPES[idx]).total : cat.items[idx].w; }

/* ====== sekmeler ====== */
function renderTabs(){
  const el=document.getElementById('tabs');
  let h = CATS.map(c=>`<div class="tab${c.id===ACTIVE?' active':''}" onclick="selectTab('${c.id}')">${c.label}</div>`).join('');
  h += `<div class="tab rapor${ACTIVE==='rapor'?' active':''}" onclick="selectTab('rapor')">📄 Rapor</div>`;
  el.innerHTML=h;
}
function selectTab(id){ closeDD(); ACTIVE=id; renderTabs(); if(id==='rapor') renderReport(); else renderCat(id); }

/* ====== kategori sayfası ====== */
function datalistFor(cat){
  return `<datalist id="dl_${cat.id}">`+items(cat).map(it=>`<option value="${escA(it.name)}"></option>`).join('')+`</datalist>`;
}
function explainHTML(cat){
  if(cat.kind==='cond'){
    return `<h3>Nasıl Hesaplanır?</h3>
      <p>Her iletken cinsi belirli sayıda <b>açık iletken</b> içerir; hesap her bileşen için ayrı yapılır: <code>adet × mesafe(km) × kg/km</code>. <b>YG</b> (3SW, 3RV, 3/0 AWG, 266 MCM, 477 MCM) tek tip iletkenin <b>3 katı</b>, <b>AER</b> kablolar tek iletken (<code>×1</code>) kabul edilir.</p>
      <p><b>Çift yön:</b> "Mesafe (km)" veya "Ağırlık (kg)" alanlarından hangisini yazarsan diğeri otomatik hesaplanır. Her satırın altında iletken bazında döküm gösterilir.</p>`;
  }
  if(cat.unit==='m'){
    return `<h3>Nasıl Hesaplanır?</h3>
      <p>Kablolar <b>metre başına ağırlık</b> ile hesaplanır: <code>uzunluk(m) × kg/m</code> ile kilogram, <code>kg ÷ kg/m</code> ile uzunluk bulunur.</p>
      <p><b>Çift yön:</b> "Uzunluk (m)" veya "Ağırlık (kg)" alanlarından birini yaz, diğeri otomatik gelsin.</p>`;
  }
  return `<h3>Nasıl Hesaplanır?</h3>
    <p>Her kalemin <b>sabit birim ağırlığı</b> (kg/adet) vardır: <code>adet × kg/adet</code> ile kilogram, <code>kg ÷ kg/adet</code> ile adet bulunur.</p>
    <p><b>Çift yön:</b> "Adet" veya "Ağırlık (kg)" alanlarından birini yaz, diğeri otomatik hesaplansın.</p>`;
}
function renderCat(id){
  closeDD();
  const cat=CATBY[id], ui=unitInfo(cat), rs=ROWS[id];
  let rows='';
  rs.forEach((r,i)=>{
    const uw=unitWeight(cat,r.idx);
    rows += `<div class="hrow">
      <div class="hno">${i+1}</div>
      <div class="picker" id="pick${i}" onclick="openDD(${i})" title="Seçmek için tıklayın">
        <span class="pn" id="pn${i}">${escA(itemName(cat,r.idx))}</span><span class="chev">▾</span>
      </div>
      <div class="huw" id="uw${i}">${fmt2(uw)} ${ui.bsuf}</div>
      <div class="hin"><input class="hf" id="a${i}" type="text" inputmode="decimal" placeholder="0" value="${fmtIn(r.a)}" oninput="onA(${i})"><span class="u">${ui.punit}</span></div>
      <div class="hin"><input class="hf" id="b${i}" type="text" inputmode="decimal" placeholder="0" value="${fmtIn(r.b)}" oninput="onB(${i})"><span class="u">kg</span></div>
      <button class="hdel" title="Satırı sil" onclick="removeRow('${id}',${i})"${rs.length<=1?' style="visibility:hidden"':''}>×</button>`;
    rows += (cat.kind==='cond') ? `<div class="hbrk" id="brk${i}">${breakdownHTML(cat,i)}</div>` : ``;
    rows += `</div>`;
  });
  const pdfClass = (cat.unit==='m' || id==='direk')?'wood':'';
  const pic=imgFor(id);
  document.getElementById('view').innerHTML = `
    <div class="panel">
      <div class="phead">
        <h2>${cat.label}<small>${cat.kind==='cond'?'Havai hat iletken':'Demontaj malzeme'} · ${ui.plabel} ↔ Ağırlık dönüşümü · malzeme ekleyerek çoğaltın</small></h2>
        ${pic?`<img class="catpic" src="${pic}" alt="${cat.label}">`:''}
      </div>
      <div class="tablewrap"><div class="htable">
        <div class="hhead"><div>#</div><div>${cat.kind==='cond'?'İletken Cinsi':'Malzeme Cinsi'}</div><div>Birim</div><div class="r">${ui.plabel}</div><div class="r">Ağırlık (kg)</div><div></div></div>
        ${rows}
        <div class="addwrap"><button class="addrow" onclick="addRow('${id}')">+ Malzeme Ekle</button></div>
        <div class="hsub"><div class="lbl">Sayfa Toplamı</div><div class="sv" id="subA"></div><div class="sv kg" id="subB"></div><div></div></div>
      </div></div>
      <div class="pageacts">
        <button class="pdfbtn ${pdfClass}" onclick="printPage('${id}')">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
          Bu sayfayı PDF olarak indir
        </button>
      </div>
      <div class="help">${explainHTML(cat)}</div>
    </div>`;
  updateSub();
}
function breakdownHTML(cat,i){
  if(cat.kind!=='cond') return '';
  const r=ROWS[cat.id][i]; const km=r.a;
  if(!(km>0)) return '';
  const p=profile(CONDTYPES[r.idx]);
  return p.comps.map(c=>`<span class="d" style="background:${c.col}"></span>${c.label} <b>${fmt(c.n*km*c.kg)}</b>`).join(' &nbsp;·&nbsp; ')+' kg';
}
/* ---- özel açılır malzeme seçici ---- */
let ddRow=-1;
function openDD(i){
  ddRow=i;
  const field=document.getElementById('pick'+i);
  const panel=document.getElementById('ddPanel');
  document.querySelectorAll('.picker.open').forEach(p=>p.classList.remove('open'));
  field.classList.add('open');
  document.getElementById('ddSearch').value='';
  buildDDList('');
  const r=field.getBoundingClientRect();
  panel.style.width=Math.max(r.width,280)+'px';
  panel.style.left=(r.left+window.scrollX)+'px';
  panel.style.top=(r.bottom+window.scrollY+6)+'px';
  panel.style.display='block';
  setTimeout(()=>document.getElementById('ddSearch').focus(),0);
}
function buildDDList(q){
  const cat=CATBY[ACTIVE], cur=ROWS[ACTIVE][ddRow].idx, its=items(cat);
  const ql=(q||'').toLocaleLowerCase('tr');
  let h='';
  its.forEach((it,idx)=>{
    if(ql && !it.name.toLocaleLowerCase('tr').includes(ql)) return;
    h+=`<div class="ddItem${idx===cur?' sel':''}" onclick="pickDD(${idx})">${escA(it.name)}</div>`;
  });
  document.getElementById('ddList').innerHTML = h || '<div class="ddEmpty">Eşleşen malzeme yok</div>';
}
function filterDD(){ buildDDList(document.getElementById('ddSearch').value); }
function pickDD(idx){
  const i=ddRow, cat=CATBY[ACTIVE], r=ROWS[ACTIVE][i];
  r.idx=idx;
  document.getElementById('pn'+i).textContent=itemName(cat,idx);
  const uw=unitWeight(cat,idx);
  document.getElementById('uw'+i).textContent=fmt2(uw)+' '+unitInfo(cat).bsuf;
  if(r.a>0){ r.b=r.a*uw; document.getElementById('b'+i).value=fmtIn(r.b); }
  else if(r.b>0){ r.a=r.b/uw; document.getElementById('a'+i).value=fmtIn(r.a); }
  refreshRow(i); updateSub(); closeDD();
}
function closeDD(){
  document.getElementById('ddPanel').style.display='none';
  document.querySelectorAll('.picker.open').forEach(p=>p.classList.remove('open'));
  ddRow=-1;
}
document.addEventListener('mousedown',(e)=>{
  const panel=document.getElementById('ddPanel');
  if(panel.style.display==='block' && !panel.contains(e.target) && !e.target.closest('.picker')) closeDD();
});
document.addEventListener('keydown',(e)=>{ if(e.key==='Escape') closeDD(); });
function addRow(id){ ROWS[id].push({idx:0,a:null,b:null}); renderCat(id); }
function removeRow(id,i){ if(ROWS[id].length>1){ ROWS[id].splice(i,1); renderCat(id); } }
function onA(i){
  const cat=CATBY[ACTIVE], r=ROWS[ACTIVE][i], uw=unitWeight(cat,r.idx);
  const v=parseNum(document.getElementById('a'+i).value);
  if(v>0){ r.a=v; r.b=v*uw; document.getElementById('b'+i).value=fmtIn(r.b); }
  else { r.a=null; r.b=null; document.getElementById('b'+i).value=''; }
  refreshRow(i); updateSub();
}
function onB(i){
  const cat=CATBY[ACTIVE], r=ROWS[ACTIVE][i], uw=unitWeight(cat,r.idx);
  const v=parseNum(document.getElementById('b'+i).value);
  if(v>0){ r.b=v; r.a=v/uw; document.getElementById('a'+i).value=fmtIn(r.a); }
  else { r.a=null; r.b=null; document.getElementById('a'+i).value=''; }
  refreshRow(i); updateSub();
}
function refreshRow(i){
  const cat=CATBY[ACTIVE];
  if(cat.kind==='cond'){ const el=document.getElementById('brk'+i); if(el) el.innerHTML=breakdownHTML(cat,i); }
}
function updateSub(){
  const cat=CATBY[ACTIVE], ui=unitInfo(cat), rs=ROWS[ACTIVE];
  let sa=0, sb=0;
  rs.forEach(r=>{ if(r.a>0) sa+=r.a; if(r.b>0) sb+=r.b; });
  const ea=document.getElementById('subA'), eb=document.getElementById('subB');
  if(ea) ea.textContent = sa>0 ? fmt(sa)+' '+ui.punit : '—';
  if(eb) eb.textContent = sb>0 ? fmt2(sb)+' kg' : '—';
}

/* ====== RAPOR ====== */
function collect(){
  const out=[];
  CATS.forEach(cat=>{
    const rows=ROWS[cat.id].map((r,i)=>({r,i})).filter(x=>x.r.b>0);
    if(!rows.length) return;
    const ui=unitInfo(cat);
    const entries=rows.map(x=>({
      name:itemName(cat,x.r.idx), primary:x.r.a, kg:x.r.b,
      punit:ui.punit,
    }));
    const subKg=entries.reduce((s,e)=>s+e.kg,0);
    out.push({cat,ui,entries,subKg});
  });
  return out;
}
function renderReport(){
  const data=collect();
  let body='';
  if(!data.length){
    body=`<div class="rempty">Henüz hesap girilmedi. Sekmelerdeki sayfalarda değer girdikçe burada listelenir.</div>`;
    document.getElementById('view').innerHTML=`<div class="panel"><h2 class="olive">Rapor<small>Tüm sayfalardaki hesapların özeti</small></h2>${body}</div>`;
    return;
  }
  let grand=0;
  data.forEach(g=>{
    grand+=g.subKg;
    let rws=g.entries.map(e=>`<tr>
      <td>${e.name}</td>
      <td class="r">${fmt(e.primary)} ${e.punit}</td>
      <td class="r">${fmt2(e.kg)} kg</td></tr>`).join('');
    body+=`<div class="rgrp"><h3>${g.cat.label}</h3>
      <table class="rtbl">
        <thead><tr><th>Malzeme</th><th class="r">${g.ui.plabel}</th><th class="r">Ağırlık</th></tr></thead>
        <tbody>${rws}
          <tr class="rsub"><td>Ara Toplam</td><td class="r"></td><td class="r">${fmt2(g.subKg)} kg</td></tr>
        </tbody></table></div>`;
  });
  body+=`<div class="rgrand"><span class="l">Genel Toplam Ağırlık</span><span class="v">${fmt2(grand)} kg</span></div>`;
  document.getElementById('view').innerHTML=`
    <div class="panel">
      <h2 class="olive">Rapor<small>Tüm sayfalardaki hesapların özeti</small></h2>
      ${body}
      <div class="pageacts">
        <button class="pdfbtn wood" onclick="printReport()">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
          Raporu PDF olarak indir
        </button>
      </div>
    </div>`;
}

/* ====== PDF / Yazdırma ====== */
function printHead(sub){
  return `<div class="ph">
      <h1><span class="c1">Demontaj</span> <span class="c2">Analizi</span></h1>
      <div class="pdsub">Elektrik Dağıtım · ${sub}</div>
    </div>`;
}
function printPage(id){
  const cat=CATBY[id], ui=unitInfo(cat);
  const rows=ROWS[id].map((r,i)=>({r,i})).filter(x=>x.r.b>0);
  if(!rows.length){ alert('Bu sayfada dolu satır yok.'); return; }
  let sub=0;
  let rws=rows.map(x=>{ sub+=x.r.b; return `<tr>
    <td>${itemName(cat,x.r.idx)}</td>
    <td class="r">${fmt(x.r.a)} ${ui.punit}</td>
    <td class="r">${fmt2(x.r.b)} kg</td></tr>`; }).join('');
  const pa=document.getElementById('printArea');
  pa.innerHTML = printHead('Malzeme Ağırlık / Miktar Hesabı')+
    `<div class="meta">Sayfa: ${cat.label}</div>
     <div class="rgrp"><h3>${cat.label}</h3>
     <table><thead><tr><th>Malzeme</th><th class="r">${ui.plabel}</th><th class="r">Ağırlık</th></tr></thead>
     <tbody>${rws}<tr class="sub"><td>Ara Toplam</td><td class="r"></td><td class="r">${fmt2(sub)} kg</td></tr></tbody></table></div>
     <div class="grand"><span class="l">Sayfa Toplam Ağırlığı</span><span class="v">${fmt2(sub)} kg</span></div>
     <div class="pfoot">Demontaj Analizi · Elektrik Dağıtım Hesap Aracı</div>`;
  doPrint('Demontaj-'+cat.label);
}
function printReport(){
  const data=collect();
  if(!data.length){ alert('Raporlanacak hesap yok.'); return; }
  let grand=0, body='';
  data.forEach(g=>{
    grand+=g.subKg;
    let rws=g.entries.map(e=>`<tr><td>${e.name}</td>
      <td class="r">${fmt(e.primary)} ${e.punit}</td>
      <td class="r">${fmt2(e.kg)} kg</td></tr>`).join('');
    body+=`<div class="rgrp"><h3>${g.cat.label}</h3>
      <table><thead><tr><th>Malzeme</th><th class="r">${g.ui.plabel}</th><th class="r">Ağırlık</th></tr></thead>
      <tbody>${rws}<tr class="sub"><td>Ara Toplam</td><td class="r"></td><td class="r">${fmt2(g.subKg)} kg</td></tr></tbody></table></div>`;
  });
  body+=`<div class="grand"><span class="l">Genel Toplam Ağırlık</span><span class="v">${fmt2(grand)} kg</span></div>`;
  const pa=document.getElementById('printArea');
  pa.innerHTML = printHead('Demontaj Raporu · Tüm Sayfalar')+
    `<div class="meta">Rapor · Tüm hesaplanan sayfalar</div>${body}
     <div class="pfoot">Demontaj Analizi · Elektrik Dağıtım Hesap Aracı</div>`;
  doPrint('Demontaj-Raporu');
}
function doPrint(title){
  const old=document.title; document.title=title;
  window.print();
  setTimeout(()=>{document.title=old;},500);
}

/* ====== başlat ====== */
renderTabs();
renderCat('iletken');
</script>
